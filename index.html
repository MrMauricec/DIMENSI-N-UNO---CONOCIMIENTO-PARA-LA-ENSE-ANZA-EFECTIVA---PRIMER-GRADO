<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dimensión Uno - Conocimiento para la Enseñanza Efectiva</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f4f8;
    color: #1a1a2e;
    line-height: 1.6;
  }
  header {
    background: linear-gradient(135deg, #1a1a6e 0%, #2563eb 60%, #0ea5e9 100%);
    color: #fff;
    text-align: center;
    padding: 36px 20px 28px;
    box-shadow: 0 4px 16px rgba(30,50,120,.3);
  }
  header h1 {
    font-size: 1.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  header p { font-size: .95rem; opacity: .85; }

  /* SCOREBOARD */
  #scoreboard {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 10px 20px;
    background: #fff;
    border-bottom: 2px solid #e2e8f0;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .score-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #f8fafc;
    border-radius: 10px;
    padding: 8px 20px;
    font-weight: 700;
    font-size: 1rem;
    border: 2px solid #e2e8f0;
  }
  .score-box.correct { border-color: #22c55e; color: #15803d; background: #f0fdf4; }
  .score-box.wrong   { border-color: #ef4444; color: #b91c1c; background: #fef2f2; }
  .score-box.total   { border-color: #3b82f6; color: #1d4ed8; background: #eff6ff; }
  .score-icon { font-size: 1.2rem; }

  /* CONTAINER */
  .container {
    max-width: 860px;
    margin: 30px auto;
    padding: 0 16px 60px;
  }

  /* QUESTION CARD */
  .question-card {
    background: #fff;
    border-radius: 14px;
    padding: 26px 28px 20px;
    margin-bottom: 22px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
    border-left: 5px solid #3b82f6;
    transition: box-shadow .2s;
  }
  .question-card:hover { box-shadow: 0 4px 20px rgba(59,130,246,.15); }
  .question-num {
    font-size: .78rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #3b82f6;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .question-text {
    font-size: 1rem;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 16px;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    background: #f8fafc;
    cursor: pointer;
    text-align: left;
    font-size: .95rem;
    color: #334155;
    transition: border-color .18s, background .18s, transform .1s;
  }
  .option-btn:hover:not(:disabled) {
    border-color: #3b82f6;
    background: #eff6ff;
    transform: translateX(3px);
  }
  .option-btn .opt-label {
    font-weight: 700;
    color: #3b82f6;
    min-width: 22px;
  }
  .option-btn.correct-ans {
    border-color: #22c55e;
    background: #f0fdf4;
    color: #15803d;
  }
  .option-btn.correct-ans .opt-label { color: #15803d; }
  .option-btn.wrong-ans {
    border-color: #ef4444;
    background: #fef2f2;
    color: #b91c1c;
  }
  .option-btn.wrong-ans .opt-label { color: #b91c1c; }
  .option-btn:disabled { cursor: default; transform: none; }

  /* FEEDBACK */
  .feedback-box {
    display: none;
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 4px;
    font-size: .92rem;
    line-height: 1.55;
  }
  .feedback-box.show { display: block; }
  .feedback-box.fb-correct {
    background: #f0fdf4;
    border: 1.5px solid #86efac;
    color: #14532d;
  }
  .feedback-box.fb-wrong {
    background: #fef2f2;
    border: 1.5px solid #fca5a5;
    color: #7f1d1d;
  }
  .feedback-box strong { font-weight: 700; }
  .feedback-icon { font-size: 1.1rem; margin-right: 4px; }

  /* SUGERENCIA */
  .sugerencia {
    margin-top: 10px;
    font-size: .84rem;
    color: #475569;
    background: #f1f5f9;
    border-radius: 7px;
    padding: 9px 13px;
    border-left: 3px solid #94a3b8;
    display: none;
  }
  .sugerencia.show { display: block; }
  .sugerencia strong { color: #334155; }

  /* RESULT BAR */
  .result-bar-wrap {
    margin-top: 10px;
    height: 5px;
    border-radius: 3px;
    background: #e2e8f0;
    overflow: hidden;
    display: none;
  }
  .result-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .5s;
  }
  .result-bar-fill.correct { background: #22c55e; }
  .result-bar-fill.wrong   { background: #ef4444; }

  /* PROGRESS */
  #progress-wrap {
    text-align: center;
    margin-bottom: 24px;
    font-size: .9rem;
    color: #64748b;
  }
  #progress-bar-outer {
    background: #e2e8f0;
    border-radius: 8px;
    height: 8px;
    margin: 8px 0 4px;
    overflow: hidden;
  }
  #progress-bar-fill {
    background: linear-gradient(90deg,#3b82f6,#06b6d4);
    height: 100%;
    border-radius: 8px;
    transition: width .4s;
    width: 0%;
  }

  /* FINAL MESSAGE */
  #final-msg {
    display: none;
    text-align: center;
    padding: 30px 20px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,.1);
    margin-top: 20px;
  }
  #final-msg h2 { font-size: 1.5rem; color: #1e293b; margin-bottom: 8px; }
  #final-msg .big-score { font-size: 3rem; font-weight: 800; color: #2563eb; }
  #final-msg p { color: #475569; margin-top: 6px; }
  #reset-btn {
    margin-top: 20px;
    padding: 12px 32px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background .2s;
  }
  #reset-btn:hover { background: #1d4ed8; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.25rem; }
    .question-card { padding: 18px 14px; }
    #scoreboard { flex-wrap: wrap; gap: 8px; }
    .score-box { padding: 7px 14px; font-size: .9rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Dimensión Uno</h1>
  <p>Conocimiento para la Enseñanza Efectiva &mdash; 100 preguntas de evaluación docente</p>
</header>

<div id="scoreboard">
  <div class="score-box correct"><span class="score-icon">✅</span> Correctas: <span id="sc-correct">0</span></div>
  <div class="score-box wrong"><span class="score-icon">❌</span> Incorrectas: <span id="sc-wrong">0</span></div>
  <div class="score-box total"><span class="score-icon">📋</span> Respondidas: <span id="sc-total">0</span> / 100</div>
</div>

<div class="container">
  <div id="progress-wrap">
    <div id="progress-bar-outer"><div id="progress-bar-fill"></div></div>
    <span id="progress-label">0 de 100 respondidas</span>
  </div>

  <div id="quiz-area"></div>
  <div id="final-msg">
    <h2>🎓 ¡Cuestionario Completado!</h2>
    <div class="big-score" id="final-score">0/100</div>
    <p id="final-comment"></p>
    <button id="reset-btn" onclick="resetQuiz()">🔄 Reiniciar cuestionario</button>
  </div>
</div>

<script>
const questions = [
  {
    num: 1,
    text: "Un docente promueve una comunidad de práctica virtual con colegas internacionales para intercambiar metodologías innovadoras. Según el Marco Europeo para la Competencia Digital de los Educadores (DigCompEdu), ¿cuál es el propósito técnico de esta acción profesional?",
    options: ["A) Gestionar infraestructura tecnológica escolar.", "B) Fortalecer desarrollo profesional colaborativo.", "C) Automatizar registros administrativos institucionales.", "D) Supervisar procesos evaluación estandarizados."],
    correct: 1,
    feedbackCorrect: "El Área 1 de DigCompEdu destaca el uso de canales digitales para la interacción profesional y el aprendizaje entre pares como motor de mejora continua.",
    feedbackWrong: "Son tareas de soporte técnico, gestión burocrática o fiscalización que no definen la competencia de desarrollo profesional colaborativo.",
    sugerencia: "Marco Europeo DigCompEdu - Área 1: Compromiso Profesional."
  },
  {
    num: 2,
    text: "Al analizar los resultados de una evaluación formativa, un docente de primer grado identifica que la mayoría del grupo no logra segmentar sílabas. De acuerdo con los Estándares de Desempeño Profesional, ¿cuál es la respuesta pedagógica de alta calidad?",
    options: ["A) Reorientar planificación según necesidades.", "B) Cumplir rigurosamente cronograma inicial.", "C) Priorizar contenidos teóricos adicionales.", "D) Estandarizar procesos instrucción grupales."],
    correct: 0,
    feedbackCorrect: "Los estándares exigen que el docente utilice los resultados del aprendizaje para ajustar su intervención y garantizar que todos alcancen los objetivos.",
    feedbackWrong: "El cumplimiento rígido de cronogramas o la estandarización ignora el enfoque de atención a la diversidad y la mejora del aprendizaje.",
    sugerencia: "Estándares de Desempeño Profesional - Dimensión: Gestión del Aprendizaje."
  },
  {
    num: 3,
    text: "En una experiencia de aprendizaje sobre el entorno, un niño de cinco años agrupa hojas secas considerando simultáneamente su forma lobulada y su textura áspera. Según el currículo de Preparatoria, ¿qué proceso cognitivo está consolidando?",
    options: ["A) Resolver problemas cálculo aritmético.", "B) Clasificar objetos atributos múltiples.", "C) Identificar formas geométricas simples.", "D) Memorizar series numéricas básicas."],
    correct: 1,
    feedbackCorrect: "En Preparatoria, la clasificación avanzada implica que el estudiante logre agrupar elementos bajo dos o más criterios de forma simultánea.",
    feedbackWrong: "El cálculo y la memoria no corresponden a esta etapa; la identificación simple es un nivel de complejidad inferior al observado en el caso.",
    sugerencia: "Currículo Priorizado Preparatoria - Relaciones Lógico-Matemáticas."
  },
  {
    num: 4,
    text: "Una docente de primer grado diseña una sesión donde los estudiantes identifican palabras que riman sin utilizar textos impresos ni grafemas. De acuerdo con la Guía para Docentes, ¿qué componente de la alfabetización inicial está priorizando?",
    options: ["A) Sistematizar copia textos narrativos.", "B) Desarrollar conciencia fonológica oral.", "C) Evaluar caligrafía trazo cursivo.", "D) Decodificar fonemas grafemas aislados."],
    correct: 1,
    feedbackCorrect: "La alfabetización inicial efectiva se fundamenta en la capacidad oral de reconocer y manipular los sonidos del habla antes de la escritura.",
    feedbackWrong: "La copia, la caligrafía o la decodificación mecánica de letras son enfoques tradicionales que no desarrollan la percepción fonológica necesaria.",
    sugerencia: "Guía para Docentes de Primer Grado - Lengua y Literatura."
  },
  {
    num: 5,
    text: "Un docente utiliza una plataforma educativa gratuita y, antes de registrar a sus estudiantes, revisa detalladamente las cláusulas de tratamiento de datos personales. Según el Catálogo de Perfiles Profesionales, ¿qué competencia está ejerciendo?",
    options: ["A) Incrementar visibilidad institucional digital.", "B) Gestionar entornos virtuales seguros.", "C) Automatizar reportes calificaciones mensuales.", "D) Seleccionar software comercial popular."],
    correct: 1,
    feedbackCorrect: "El perfil docente exige un uso ético y seguro de las TIC, garantizando en todo momento la protección de la privacidad de los menores.",
    feedbackWrong: "El interés comercial, la popularidad del software o la visibilidad en redes no justifican la vulneración de la seguridad digital estudiantil.",
    sugerencia: "Catálogo de Perfiles Profesionales - Competencias en TIC y Ética."
  },
  {
    num: 6,
    text: "Durante una discusión entre pares por el uso de materiales en el rincón de construcción, el docente facilita un proceso de mediación donde los niños proponen acuerdos. ¿Qué indicador de calidad educativa se está cumpliendo?",
    options: ["A) Mantener orden mediante autoridad.", "B) Promover clima aula positivo.", "C) Sancionar conductas disruptivas severamente.", "D) Delegar resolución autoridades directivas."],
    correct: 1,
    feedbackCorrect: "Los estándares valoran la capacidad del docente para gestionar conflictos mediante el diálogo, fortaleciendo habilidades sociales y la convivencia armónica.",
    feedbackWrong: "El autoritarismo, la sanción punitiva o la delegación externa son prácticas que no contribuyen a un clima de aprendizaje de calidad.",
    sugerencia: "Estándares de Calidad Educativa - Gestión del Aprendizaje (Clima de Aula)."
  },
  {
    num: 7,
    text: "Un docente selecciona una herramienta digital que permite a los estudiantes elegir entre leer un texto, escuchar un audio o ver un video sobre el mismo tema científico. ¿Qué subcompetencia del área de Empoderamiento de los alumnos está aplicando?",
    options: ["A) Monitorizar tiempo conexión estudiantes.", "B) Atender diversidad ritmos aprendizaje.", "C) Priorizar resultados técnicos grupales.", "D) Estandarizar procesos evaluación digitales."],
    correct: 1,
    feedbackCorrect: "El empoderamiento digital implica ofrecer múltiples medios de representación y acción para responder a los diferentes estilos y necesidades del grupo.",
    feedbackWrong: "La estandarización o el monitoreo técnico no abordan la personalización pedagógica que busca este componente del marco europeo.",
    sugerencia: "Marco Europeo DigCompEdu - Área 5: Diferenciación y personalización."
  },
  {
    num: 8,
    text: "En la rutina diaria, la docente de Preparatoria permite que cada niño organice de forma independiente su material de trabajo y elija el rincón donde desea iniciar la jornada. ¿Qué eje de desarrollo busca fortalecer primordialmente?",
    options: ["A) Seguir instrucciones profesor rígidamente.", "B) Potenciar niveles autonomía personal.", "C) Memorizar nombres objetos aula.", "D) Esperar ayuda docente siempre."],
    correct: 1,
    feedbackCorrect: "El ámbito de Identidad y Autonomía promueve que el niño tome decisiones progresivas sobre sus acciones, desarrollando seguridad e independencia.",
    feedbackWrong: "Las prácticas de control rígido o dependencia inhiben el desarrollo integral y la iniciativa personal que demanda el currículo nacional.",
    sugerencia: "Currículo Priorizado Preparatoria - Identidad y Autonomía."
  },
  {
    num: 9,
    text: "Al planificar la enseñanza de la lengua, un docente de primer grado organiza una visita a la oficina de correos para que los niños comprendan la utilidad de las cartas. Según el enfoque comunicativo, ¿qué objetivo persigue?",
    options: ["A) Evaluar ortografía reglas gramaticales.", "B) Enriquecer contextos comunicativos reales.", "C) Sistematizar copia frases cortas.", "D) Priorizar decodificación mecánica grafemas."],
    correct: 1,
    feedbackCorrect: "El aprendizaje funcional de la lengua requiere que el estudiante interactúe con el lenguaje escrito en situaciones de uso real y significativo.",
    feedbackWrong: "La corrección ortográfica temprana, la copia o la decodificación aislada se alejan de la construcción de sentidos del enfoque comunicativo.",
    sugerencia: "Guía para Docentes de Primer Grado - Lengua y Literatura."
  },
  {
    num: 10,
    text: "Durante una salida al huerto escolar, el docente guía a los estudiantes para que formulen hipótesis sobre por qué algunas plantas crecen más que otras. Según el currículo de Preparatoria, ¿qué capacidad está impulsando?",
    options: ["A) Memorizar términos científicos complejos.", "B) Fomentar indagación científica guiada.", "C) Priorizar recolección muestras biológicas.", "D) Evaluar conocimientos teóricos botánica."],
    correct: 1,
    feedbackCorrect: "El descubrimiento del medio natural busca que el niño utilice sus sentidos y el pensamiento crítico para explorar y comprender su entorno.",
    feedbackWrong: "El academicismo basado en memoria o teoría no corresponde al nivel de desarrollo de Preparatoria, que prioriza la exploración vivencial.",
    sugerencia: "Currículo Priorizado 2025 - Descubrimiento y Comprensión del Medio Natural."
  },
  {
    num: 11,
    text: "Un docente de primer grado selecciona una herramienta digital para que sus estudiantes graben audios describiendo objetos del entorno escolar. Según el Marco Europeo para la Competencia Digital de los Educadores (DigCompEdu), ¿qué capacidad técnica está fortaleciendo en el alumnado?",
    options: ["A) Evaluar contenidos técnicos complejos.", "B) Fomentar comunicación colaboración digital.", "C) Gestionar identidades virtuales seguras.", "D) Monitorear tiempo conexión estudiantes."],
    correct: 1,
    feedbackCorrect: "El área 6 del marco digital destaca la importancia de facilitar experiencias donde los estudiantes utilicen tecnologías para interactuar y expresarse de forma creativa.",
    feedbackWrong: "No se alinean con el objetivo pedagógico de la actividad, que se centra en el uso funcional y comunicativo de la tecnología por parte del niño.",
    sugerencia: "Marco Europeo DigCompEdu - Área 6: Desarrollo de la competencia digital de los estudiantes."
  },
  {
    num: 12,
    text: "En una experiencia de aprendizaje de Preparatoria, el docente entrega semillas de diversos tamaños y solicita a los estudiantes que las agrupen considerando simultáneamente su color y su textura. ¿Qué destreza del pensamiento lógico está consolidando?",
    options: ["A) Resolver problemas cálculo matemático.", "B) Memorizar nombres científicos especies.", "C) Clasificar objetos criterios múltiples.", "D) Identificar formas geométricas simples."],
    correct: 2,
    feedbackCorrect: "El currículo priorizado establece que el niño debe avanzar hacia la clasificación de elementos basándose en dos o más atributos de forma simultánea.",
    feedbackWrong: "El cálculo y la memoria no corresponden a esta etapa de desarrollo; la identificación de formas es una habilidad de geometría, no de relaciones lógicas.",
    sugerencia: "Currículo Priorizado Preparatoria - Relaciones Lógico-Matemáticas."
  },
  {
    num: 13,
    text: "Un docente identifica que un estudiante de su grupo presenta señales de una posible vulneración de derechos en su entorno familiar. De acuerdo con el Catálogo de Perfiles Profesionales, ¿cuál es el proceder técnico obligatorio?",
    options: ["A) Delegar intervención especialistas externos.", "B) Activar rutas protección integral.", "C) Ignorar situación detectada aula.", "D) Priorizar intereses institucionales personales."],
    correct: 1,
    feedbackCorrect: "El perfil profesional exige que el docente actúe como garante de derechos, activando inmediatamente los protocolos y rutas de protección vigentes.",
    feedbackWrong: "Representan omisiones graves a la responsabilidad ética y legal del docente, cuya prioridad debe ser el interés superior del niño.",
    sugerencia: "Catálogo de Perfiles Profesionales - Competencias Éticas y Legales."
  },
  {
    num: 14,
    text: "Durante la jornada de alfabetización inicial, el docente utiliza etiquetas con nombres de objetos reales para que los niños de primer grado los identifiquen en el aula. Según la Guía para Docentes, ¿qué enfoque didáctico está aplicando?",
    options: ["A) Decodificar fonemas grafemas aislados.", "B) Promover lectura emergente funcional.", "C) Sistematizar copia textos extensos.", "D) Evaluar caligrafía trazo perfecto."],
    correct: 1,
    feedbackCorrect: "El enfoque comunicativo busca que el niño interactúe con el lenguaje escrito en contextos reales y significativos, comprendiendo su utilidad social.",
    feedbackWrong: "Se enfocan en aspectos mecánicos o gráficos que no corresponden a la construcción de sentidos que propone la reforma curricular actual.",
    sugerencia: "Guía para Docentes de Primer Grado - Lengua y Literatura."
  },
  {
    num: 15,
    text: "Un profesor utiliza una plataforma de gestión de aprendizaje para proporcionar comentarios específicos y sugerencias de mejora a cada estudiante tras un proyecto grupal. Según DigCompEdu, ¿qué área competencial ejerce?",
    options: ["A) Brindar retroalimentación oportuna digital.", "B) Automatizar reportes calificaciones mensuales.", "C) Seleccionar recursos comerciales populares.", "D) Sustituir mediación docente directa."],
    correct: 0,
    feedbackCorrect: "El área de evaluación (Área 4) destaca el uso de tecnologías para ofrecer comentarios rápidos y personalizados que guíen el proceso de aprendizaje.",
    feedbackWrong: "No representan una competencia de análisis pedagógico, sino gestiones burocráticas, comerciales o una visión errónea del rol tecnológico.",
    sugerencia: "Marco Europeo DigCompEdu - Área 4: Evaluación."
  },
  {
    num: 16,
    text: "Al finalizar una actividad de expresión corporal, el docente de Preparatoria guía una plenaria donde los niños deben explicar cómo se sintieron al representar diferentes emociones. ¿Qué eje de desarrollo está priorizando?",
    options: ["A) Fomentar la inteligencia socioemocional.", "B) Evaluar coordinación motriz gruesa.", "C) Dictar conceptos teóricos psicología.", "D) Imponer normas comportamiento rígidamente."],
    correct: 0,
    feedbackCorrect: "El currículo priorizado enfatiza que el desarrollo de la identidad y la convivencia debe basarse en el reconocimiento y expresión de las propias emociones.",
    feedbackWrong: "Aunque se usó el movimiento, el objetivo de la plenaria es la autorreflexión emocional, no la técnica física o el control disciplinario.",
    sugerencia: "Currículo Priorizado Preparatoria - Ámbito Identidad y Autonomía."
  },
  {
    num: 17,
    text: "Un docente revisa los indicadores de los Estándares de Calidad Educativa para autoevaluar su gestión pedagógica. ¿Cuál de estos indicadores caracteriza un desempeño profesional de alta calidad?",
    options: ["A) Seguir solamente libro texto.", "B) Completar todos registros diarios.", "C) Retroalimentar oportunamente el desempeño.", "D) Mantener silencio absoluto clases."],
    correct: 2,
    feedbackCorrect: "La retroalimentación constante es el indicador fundamental de que la evaluación se utiliza con fines formativos para mejorar el aprendizaje.",
    feedbackWrong: "Son tareas administrativas o enfoques tradicionales de control que no garantizan necesariamente una mejora en la calidad del aprendizaje.",
    sugerencia: "Estándares de Desempeño Profesional - Gestión del Aprendizaje."
  },
  {
    num: 18,
    text: "La docente de primer grado organiza el \"rincón de la tienda\" y entrega monedas de papel a los estudiantes para realizar intercambios sencillos de productos. ¿Cuál es el propósito didáctico prioritario?",
    options: ["A) Memorizar tablas sumar restar.", "B) Contextualizar nociones matemáticas básicas.", "C) Priorizar ejercicios cálculo mental.", "D) Evaluar rapidez resolución problemas."],

let correct = 0;
let wrong = 0;
let answered = 0;
const optLabels = ['A','B','C','D'];

function buildQuiz() {
  const area = document.getElementById('quiz-area');
  area.innerHTML = '';
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'q' + qi;

    const num = document.createElement('div');
    num.className = 'question-num';
    num.textContent = 'Pregunta ' + q.num + ' de 100';
    card.appendChild(num);

    const txt = document.createElement('div');
    txt.className = 'question-text';
    txt.textContent = q.text;
    card.appendChild(txt);

    const opts = document.createElement('div');
    opts.className = 'options';
    q.options.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.setAttribute('data-qi', qi);
      btn.setAttribute('data-oi', oi);
      btn.innerHTML = '<span class="opt-label">' + optLabels[oi] + ')</span> ' + opt.replace(/^[ABCD]\)\s*/,'');
      btn.addEventListener('click', handleAnswer);
      opts.appendChild(btn);
    });
    card.appendChild(opts);

    const fb = document.createElement('div');
    fb.className = 'feedback-box';
    fb.id = 'fb' + qi;
    card.appendChild(fb);

    const sg = document.createElement('div');
    sg.className = 'sugerencia';
    sg.id = 'sg' + qi;
    sg.innerHTML = '<strong>📚 Sugerencia de fuente:</strong> ' + q.sugerencia;
    card.appendChild(sg);

    area.appendChild(card);
  });
}

function handleAnswer(e) {
  const btn = e.currentTarget;
  const qi = parseInt(btn.getAttribute('data-qi'));
  const oi = parseInt(btn.getAttribute('data-oi'));
  const q = questions[qi];

  // Disable all buttons for this question
  const card = document.getElementById('q' + qi);
  const allBtns = card.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  // Mark correct / wrong
  allBtns[q.correct].classList.add('correct-ans');
  if (oi !== q.correct) {
    btn.classList.add('wrong-ans');
  }

  // Feedback
  const fb = document.getElementById('fb' + qi);
  fb.classList.add('show');
  if (oi === q.correct) {
    correct++;
    fb.classList.add('fb-correct');
    fb.innerHTML = '<span class="feedback-icon">✅</span><strong>¡Correcto!</strong> ' + q.feedbackCorrect;
    document.getElementById('sc-correct').textContent = correct;
  } else {
    wrong++;
    fb.classList.add('fb-wrong');
    fb.innerHTML = '<span class="feedback-icon">❌</span><strong>Incorrecto.</strong> ' + q.feedbackWrong + '<br><br><strong>La respuesta correcta es: ' + optLabels[q.correct] + ')</strong>';
    document.getElementById('sc-wrong').textContent = wrong;
  }

  // Show suggestion
  document.getElementById('sg' + qi).classList.add('show');

  answered++;
  document.getElementById('sc-total').textContent = answered;
  updateProgress();

  if (answered === 100) showFinal();
}

function updateProgress() {
  const pct = (answered / 100) * 100;
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = answered + ' de 100 respondidas';
}

function showFinal() {
  document.getElementById('final-msg').style.display = 'block';
  document.getElementById('final-score').textContent = correct + '/100';
  let comment = '';
  const pct = correct;
  if (pct >= 90) comment = '🏆 ¡Excelente desempeño! Dominas los conocimientos para la enseñanza efectiva.';
  else if (pct >= 70) comment = '👍 Buen resultado. Sigue profundizando en las fuentes sugeridas.';
  else if (pct >= 50) comment = '📖 Resultado regular. Te recomendamos revisar los marcos y estándares citados.';
  else comment = '💪 Hay oportunidades de mejora. Consulta las fuentes sugeridas en cada pregunta.';
  document.getElementById('final-comment').textContent = comment;
  document.getElementById('final-msg').scrollIntoView({behavior:'smooth'});
}

function resetQuiz() {
  correct = 0; wrong = 0; answered = 0;
  document.getElementById('sc-correct').textContent = 0;
  document.getElementById('sc-wrong').textContent = 0;
  document.getElementById('sc-total').textContent = 0;
  document.getElementById('progress-bar-fill').style.width = '0%';
  document.getElementById('progress-label').textContent = '0 de 100 respondidas';
  document.getElementById('final-msg').style.display = 'none';
  buildQuiz();
  window.scrollTo({top:0, behavior:'smooth'});
}

buildQuiz();
</script>
</body>
</html>
